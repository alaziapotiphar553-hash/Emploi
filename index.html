<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>INSTA-EDT | Gestion Emploi du temps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Tous les styles identiques à la version précédente */
        .glass-card { background: rgba(172, 201, 253, 0.9); backdrop-filter: blur(12px); border: 1px solid ; }
        .sidebar-item.active { background: #FBBF24 !important; color: #1E3A8A !important; }
        .sidebar-item:not(.active):hover { background: rgba(255,255,255,0.2); transform: translateX(4px); }
        .transition-smooth { transition: all 0.2s ease; }
        .toast { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        button, .btn, .role-btn, .level-select, #pdfExportBtn, #pdfExportAllBtn, #publishFileBtn, .logout-btn, .home-btn, .downloadPublishedBtn {
            transition: all 0.25s ease-in-out !important;
        }
        button:hover, .btn:hover, .role-btn:hover, .level-select:hover, #pdfExportBtn:hover, #pdfExportAllBtn:hover, #publishFileBtn:hover, .logout-btn:hover, .home-btn:hover, .downloadPublishedBtn:hover {
            transform: translateY(-2px) scale(1.02) !important;
            filter: brightness(1.05) !important;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2) !important;
        }
        button:active, .btn:active, .role-btn:active, .level-select:active, #pdfExportBtn:active, #pdfExportAllBtn:active, #publishFileBtn:active, .logout-btn:active, .home-btn:active, .downloadPublishedBtn:active {
            transform: translateY(0px) scale(0.98) !important;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            animation: fadeInScale 0.6s ease-out;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .role-btn {
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .role-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .logout-btn, .home-btn {
            background-color: #dc2626;
            transition: all 0.2s;
        }
        .logout-btn:hover, .home-btn:hover {
            background-color: #b91c1c;
            transform: scale(1.02);
        }
        .home-btn {
            background-color: #3b82f6;
        }
        .home-btn:hover {
            background-color: #2563eb;
        }
        .email-input {
            border: 1px solid #ccc;
            transition: all 0.2s;
        }
        .email-input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .admin-only { display: flex; }
        
        .publicity-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a, #312e81);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .publicity-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .logo-animation {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .download-btn-pub {
            background-color: #25D366;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 1.1rem;
        }
        .download-btn-pub:hover {
            background-color: #128C7E;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<!-- Interface principale ADMIN -->
<div id="mainApp" style="display: none;">
    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-72 bg-blue-900/80 backdrop-blur-md text-white p-5 flex flex-col shadow-2xl border-r border-white/20">
            <div class="mb-8 text-center">
                <div class="bg-white/20 backdrop-blur p-3 rounded-full inline-block mb-3">
                    <img id="sidebarLogoImg" src="" alt="Logo" width="80" height="80" style="border-radius: 50%; object-fit: cover; width: 80px; height: 80px;">
                </div>
                <h2 class="font-bold text-xl">INSTA-GENIE-INFORMATIQUE</h2>
                <p class="text-xs text-blue-200">L1/L2/L3 - Génie Info</p>
                <p id="userEmailDisplay" class="text-xs text-blue-200 mt-1"></p>
            </div>
            <nav class="flex-grow space-y-2">
                <a href="#" data-page="dashboard" class="sidebar-item flex items-center p-3 rounded-xl gap-3"><i class="fas fa-chart-line w-5"></i> Tableau de bord</a>
                <a href="#" data-page="teachers" class="sidebar-item admin-only flex items-center p-3 rounded-xl gap-3"><i class="fas fa-chalkboard-user w-5"></i> Enseignants</a>
                <a href="#" data-page="rooms" class="sidebar-item admin-only flex items-center p-3 rounded-xl gap-3"><i class="fas fa-door-open w-5"></i> Salles</a>
                <a href="#" data-page="sessions" class="sidebar-item admin-only flex items-center p-3 rounded-xl gap-3"><i class="fas fa-file-alt w-5"></i> Séances</a>
            </nav>
            <div class="mt-auto pt-6 border-t border-blue-700/50 text-xs space-y-2">
                <button id="homeBtn" class="w-full home-btn p-2 rounded-lg text-sm font-semibold"><i class="fas fa-home mr-1"></i> Accueil</button>
                <button id="logoutBtn" class="w-full logout-btn p-2 rounded-lg text-sm font-semibold"><i class="fas fa-sign-out-alt mr-1"></i> Déconnexion</button>
                <div class="text-center text-blue-200 mt-3">Session 2025-2026</div>
            </div>
        </aside>
        <main class="flex-grow p-4 md:p-6 overflow-y-auto">
            <div id="dynamicContent" class="space-y-6">Chargement...</div>
        </main>
    </div>
</div>

<!-- Page de connexion -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card text-center">
        <div class="mb-6">
            <i class="fas fa-calendar-alt text-5xl text-blue-700"></i>
            <h1 class="text-3xl font-bold text-blue-900 mt-2">INSTA-</h1>
            <p class="text-gray-600">Gestion des emplois du temps</p>
        </div>
        <div class="space-y-4">
            <div>
                <input type="email" id="loginEmail" placeholder="Votre email professionnel" class="email-input w-full px-4 py-3 rounded-xl bg-white/80 text-gray-800">
                <p class="text-xs text-gray-500 mt-1">Ex: prenom.nom@insta-edu.td</p>
            </div>
            <button data-role="admin" class="role-btn w-full py-3 px-4 rounded-xl bg-blue-100 text-blue-800 font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-user-shield"></i> Administrateur
            </button>
            <button data-role="teacher" class="role-btn w-full py-3 px-4 rounded-xl bg-green-100 text-green-800 font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-chalkboard-user"></i> Enseignant
            </button>
            <button data-role="student" class="role-btn w-full py-3 px-4 rounded-xl bg-purple-100 text-purple-800 font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-user-graduate"></i> Étudiant
            </button>
        </div>
        <p class="text-xs text-gray-400 mt-6">🔒 Entrez un email valide pour accéder</p>
    </div>
</div>

<script>
    // ---------- CONFIGURATION ----------
    const SLOTS = [
        { debut: "07:30", fin: "09:30", label: "7h30-9h30" },
        { debut: "09:45", fin: "12:45", label: "9h45-12h45" },
        { debut: "12:45", fin: "13:45", label: "12h45-13h45", isPause: true },
        { debut: "13:45", fin: "15:45", label: "13h45-15h45" },
        { debut: "16:00", fin: "17:30", label: "16h-17h30" }
    ];
    const JOURS = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
    const LEVELS = ['L1', 'L2', 'L3'];
    const NATURES = ['CT', 'TP', 'TD', 'ET', 'ER' ,'CC'];

    let teachers = [], rooms = [], sessions = [];
    let logoDataURL = null, backgroundImageURL = null, sidebarLogoURL = localStorage.getItem('sidebarLogo') || null;
    let currentRole = localStorage.getItem('userRole') || null;
    let currentUserEmail = localStorage.getItem('userEmail') || null;
    let currentPage = 'dashboard';
    let editSessionId = null, editTeacherId = null, editRoomId = null;
    let currentSelectedLevel = 'L1';
    
    let lastPublishedFile = localStorage.getItem('insta_published_file') || null;

    function updateSidebarLogo() {
        const img = document.getElementById('sidebarLogoImg');
        if (img) {
            if (sidebarLogoURL) img.src = sidebarLogoURL;
            else img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffffff"%3E%3Cpath d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/%3E%3C/svg%3E';
        }
    }

    function timeToMinutes(time) { let [h,m]=time.split(':').map(Number); return h*60+m; }
    function isOverlappingBreak(start,end){ let s=timeToMinutes(start), e=timeToMinutes(end), bS=timeToMinutes("12:45"), bE=timeToMinutes("13:45"); return s<bE && e>bS; }
    function getDurationHours(start,end){ return (timeToMinutes(end)-timeToMinutes(start))/60; }
    function showToast(msg,type='success'){
        let toast=document.createElement('div');
        toast.className=`fixed bottom-6 right-6 z-50 p-4 rounded-xl shadow-2xl text-white font-medium flex items-center gap-3 toast ${type==='success'?'bg-green-600':type==='error'?'bg-red-600':'bg-yellow-600'}`;
        toast.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-triangle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(),3500);
    }

    const STORAGE={TEACHERS:'insta_teachers_officiel', ROOMS:'insta_rooms_officiel', SESSIONS:'insta_sessions_officiel'};
    function persistAll(){ localStorage.setItem(STORAGE.TEACHERS,JSON.stringify(teachers)); localStorage.setItem(STORAGE.ROOMS,JSON.stringify(rooms)); localStorage.setItem(STORAGE.SESSIONS,JSON.stringify(sessions)); }
    function loadData(){ teachers=JSON.parse(localStorage.getItem(STORAGE.TEACHERS)||'[]'); rooms=JSON.parse(localStorage.getItem(STORAGE.ROOMS)||'[]'); sessions=JSON.parse(localStorage.getItem(STORAGE.SESSIONS)||'[]'); }
    function resetAllData(){ teachers=[]; rooms=[]; sessions=[]; persistAll(); showToast("Données réinitialisées","success"); renderCurrentPage(); }

    function checkConflict(newSession,excludeId=null){
        let slotExists=SLOTS.some(slot=>slot.debut===newSession.start && slot.fin===newSession.end && !slot.isPause);
        if(!slotExists && !(newSession.start==="12:45" && newSession.end==="13:45")) return {conflict:true,message:"Les horaires doivent correspondre à un créneau prédéfini (7h30-9h30, 9h45-12h45, 13h45-15h45 ou 16h-17h30)."};
        if(isOverlappingBreak(newSession.start,newSession.end)) return {conflict:true,message:"Impossible : la plage 12h45-13h45 est réservée à la pause."};
        for(let s of sessions){
            if(excludeId && s.id===excludeId) continue;
            if(s.day!==newSession.day) continue;
            if(s.start===newSession.start && s.end===newSession.end){
                if(s.level===newSession.level) return {conflict:true,message:`Conflit pour le niveau ${s.level} : séance "${s.subject}" déjà programmée sur ce créneau.`};
                if(s.teacherId===newSession.teacherId){ let t=teachers.find(t=>t.id===s.teacherId); return {conflict:true,message:`Conflit enseignant : ${t?.name} a déjà une séance sur ce créneau (${s.subject})`};}
                if(s.roomId===newSession.roomId){ let r=rooms.find(r=>r.id===s.roomId); return {conflict:true,message:`Conflit salle : ${r?.name} est déjà occupée sur ce créneau (${s.subject})`};}
            }
        }
        return {conflict:false};
    }
    function getTeacherWeeklyHours(teacherId,excludeId=null){ let total=0; for(let s of sessions){ if(excludeId && s.id===excludeId) continue; if(s.teacherId===teacherId) total+=getDurationHours(s.start,s.end); } return total; }

    // ---------- GÉNÉRATION PDF OFFICIEL EXACTEMENT COMME AVANT ----------
    function generateHTMLForLevel(niveau){
        const sessionsNiveau = sessions.filter(s => s.level === niveau);
        // Créer une grille [jour][heure] de session
        let grid = {};
        JOURS.forEach(j => { grid[j] = {}; });
        for (let s of sessionsNiveau) {
            if (!grid[s.day]) continue;
            grid[s.day][s.start] = s;
        }
        const today = new Date();
        const dateStr = today.toLocaleDateString('fr-FR');
        const endDate = new Date(today.getTime() + 7*86400000).toLocaleDateString('fr-FR');
        
        let bgImageStyle = backgroundImageURL ? `background-image: url('${backgroundImageURL}'); background-size: 60% auto; background-repeat: no-repeat; background-position: center;` : "";
        let logoHtml = logoDataURL ? `<img src="${logoDataURL}" style="display: block; margin: 0 auto; width:55px; height:55px; object-fit: contain;">` : "";
        
        let tableHtml = `
        <div class="content" style="position: relative; background-color: white;">
            ${backgroundImageURL ? `<div class="bg-image" style="${bgImageStyle} opacity: 0.15; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;"></div>` : ""}
            <div style="position: relative; z-index: 1;">
                <div class="header">
                    <div style="color: #0033cc; font-weight: bold; font-size: 8.5pt;">
                        INSTITUT NATIONAL SUPERIEUR DES SCIENCES ET TECHNIQUES D'ABECHE (INSTA)<br>
                        DEPARTEMENT DE GENIE INFORMATIQUE (GI)
                    </div>
                    ${logoHtml ? `<div style="text-align:center; margin:1px;">${logoHtml}</div>` : ""}
                    <div class="inst-name">Emploi du Temps Du : ${dateStr} Au ${endDate} (Année Académique 2025-2026)</div>
                </div>
                <div class="header-info">
                    <div>Niveau ${niveau}</div>
                </div>
                <table>
                    <thead>
                        <tr class="title-row">
                            <th class="col-jours">Jours</th>
                            <th class="col-horaire">Horaires</th>
                            <th class="col-matiere">Matières</th>
                            <th>Nature</th>
                            <th>Salles/Amphi</th>
                            <th>Enseignants</th>
                        </tr>
                    </thead>
                    <tbody>
        `;
        
        // Génération des lignes pour chaque jour
        for (let jour of JOURS) {
            for (let idx = 0; idx < SLOTS.length; idx++) {
                const slot = SLOTS[idx];
                const isPause = slot.isPause;
                const session = grid[jour][slot.debut];
                const natureClass = session ? `nature-${session.nature}` : "";
                
                if (idx === 0) {
                    tableHtml += `<tr ${!isPause ? 'class="session-row"' : ''}><td rowspan="5" style="vertical-align:middle; font-weight:bold;">${jour}</td>`;
                } else {
                    tableHtml += `<tr ${!isPause ? 'class="session-row"' : ''}>`;
                }
                
                tableHtml += `<td ${isPause ? 'class="pause"' : ''}>${slot.label}</td>`;
                
                if (isPause) {
                    tableHtml += `<td colspan="3" class="pause">Pause</td>`;
                } else {
                    const matiere = session ? session.subject : "";
                    const nature = session ? (session.nature || "CT") : "";
                    const salle = session ? (rooms.find(r => r.id === session.roomId)?.name || "") : "";
                    const enseignant = session ? (teachers.find(t => t.id === session.teacherId)?.name || "") : "";
                    tableHtml += `<td>${matiere}</td><td class="${natureClass}">${nature}</td><td>${salle}</td><td>${enseignant}</td>`;
                }
                tableHtml += `</tr>`;
            }
        }
        
        tableHtml += `
                    </tbody>
                </table>
            </div>
            <div class="signature-section" style="position: relative; z-index: 1;">
                <div class="footer-date">Abéché le ${dateStr}</div>
                <div class="signature">
                    <b>Chef de Section GI</b><br>
                    <u>MADINA ALI IZERIK</u><br>
                    (Signature & Cachet)
                </div>
            </div>
        </div>
        `;
        return tableHtml;
    }

    function getFullPDFHTML(level){
        return `<!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Emploi du temps ${level}</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                @page { size: A4 landscape; margin: 0.4cm; }
                body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 8.2pt; margin:0; padding:0; background-color: white; }
                .content { padding: 3px; border-radius: 2px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; page-break-after: avoid; position: relative; background-color: ; }
                .header { text-align: center; margin-bottom: 1px; }
                .inst-name { font-weight: bold; font-size: 8.5pt; margin-top: 1px; }
                table { width: 100%; border-collapse: collapse; margin-top: 2px; }
                th, td { border: 1px solid ; padding: 1px 1px; text-align: center; vertical-align: middle; }
                th { background-color: ; : bold; }
                .title-row { background-color: ; }
                .pause { background-color: #ffff00 !important; : bold; }
                .session-row { background-color: ; }
                .header-info { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 1px; font-size: 8pt; }
                .signature-section { margin-top: 3px; display: flex; justify-content: space-between; align-items: flex-end; }
                .footer-date { font-size: 7pt; }
                .signature { text-align: center; font-size: 7pt; }
                .col-jours { width: 10%; }
                .col-horaire { width: 13%; }
                .col-matiere { width: 30%; }
                .nature-CT { background-color: }
                .nature-TP { background-color: ; }
                .nature-TD { background-color: ; }
                .nature-ET { background-color: ; }
                .nature-ER { background-color: #e2d5f5; }
            </style>
        </head>
        <body>
            ${generateHTMLForLevel(level)}
        </body>
        </html>`;
    }

    async function exporterPDFOfficiel(niveau){
        const win = window.open();
        win.document.write(getFullPDFHTML(niveau));
        win.document.close();
        win.print();
        showToast(`PDF généré pour ${niveau}`, "success");
    }
    
    async function exporterAllLevelsPDF(){
        let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Emplois du temps complets (L1/L2/L3)</title><style>
            *{margin:0;padding:0;box-sizing:border-box;}
            @page{size:A4 landscape;margin:0.4cm;}
            body{font-family:'Segoe UI',Arial,sans-serif;font-size:8.2pt;margin:0;padding:0;background-color:white;}
            .content{padding:3px;border-radius:2px;height:100%;display:flex;flex-direction:column;justify-content:space-between;page-break-after:always;position:relative;background-color:white;}
            .header{text-align:center;margin-bottom:1px;}
            .inst-name{font-weight:bold;font-size:8.5pt;margin-top:1px;}
            table{width:100%;border-collapse:collapse;margin-top:2px;}
            th,td{border:1px solid #111;padding:1px 1px;text-align:center;vertical-align:middle;}
            th{background-color:#f2f2f2;font-weight:bold;}
            .title-row{background-color:#e9ecef;}
            .pause{background-color:#ffff00 !important;font-weight:bold;}
            .session-row{background-color:;}
            .header-info{display:flex;justify-content:space-between;font-weight:bold;margin-bottom:1px;font-size:8pt;}
            .signature-section{margin-top:3px;display:flex;justify-content:space-between;align-items:flex-end;}
            .footer-date{font-size:7pt;}
            .signature{text-align:center;font-size:7pt;}
            .col-jours{width:10%;}.col-horaire{width:13%;}.col-matiere{width:30%;}
            .nature-CT{background-color:#d4edda;}.nature-TP{background-color:#fff3cd;}.nature-TD{background-color:#d1ecf1;}.nature-ET{background-color:#f8d7da;}.nature-ER{background-color:#e2d5f5;}
        </style></head><body>`;
        for(let level of LEVELS) html += generateHTMLForLevel(level);
        html += `</body></html>`;
        const win = window.open();
        win.document.write(html);
        win.document.close();
        win.print();
        showToast("PDF des 3 niveaux généré", "success");
    }

    // Publication
    function publishCurrentSchedule(){
        if(currentRole !== 'admin') return;
        const htmlContent = getFullPDFHTML(currentSelectedLevel);
        localStorage.setItem('insta_published_file', htmlContent);
        localStorage.setItem('insta_published_timestamp', new Date().toISOString());
        localStorage.setItem('insta_published_level', currentSelectedLevel);
        showToast(`Emploi du temps ${currentSelectedLevel} publié !`, "success");
    }

    // ---------- TABLEAU DE BORD ADMIN (version simple) ----------
    function renderDashboard(){
        const html = `
            <div class="glass-card rounded-3xl p-8 shadow-xl text-center">
                <div class="mb-8">
                    <h2 class="text-3xl font-black text-blue-900 mb-2"><i class="fas fa-calendar-alt mr-2 text-yellow-500"></i>Gestion des emplois du temps officiels</h2>
                    <p class="text-gray-600">Sélectionnez un niveau puis exportez l'emploi du temps au format officiel PDF (paysage A4, une page).</p>
                </div>
                <div class="flex flex-wrap justify-center gap-6 items-center">
                    <div class="flex gap-3 bg-white/50 p-2 rounded-full">
                        ${LEVELS.map(lvl => `<button data-level="${lvl}" class="level-select px-6 py-2 rounded-full text-sm font-semibold transition ${currentSelectedLevel===lvl ? 'bg-blue-700 text-white' : 'bg-transparent text-blue-800 hover:bg-blue-100'}">${lvl}</button>`).join('')}
                    </div>
                    <button id="pdfExportBtn" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-full shadow-md"><i class="fas fa-file-pdf mr-2"></i> Exporter ce niveau</button>
                    <button id="pdfExportAllBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-full shadow-md"><i class="fas fa-file-pdf mr-2"></i> Exporter tous les niveaux</button>
                    <button id="publishFileBtn" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-full shadow-md ml-2"><i class="fas fa-cloud-upload-alt mr-2"></i> Publier cet emploi</button>
                </div>
                <div class="mt-8 border-t pt-6 text-left">
                    <h3 class="font-bold text-lg mb-3">Personnalisation</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium">Logo de la sidebar</label>
                            <input type="file" id="sidebarLogoUpload" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:bg-blue-50 file:text-blue-700">
                        </div>
                        <div>
                            <label class="block text-sm font-medium">Logo (en-tête PDF)</label>
                            <input type="file" id="logoUpload" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:bg-blue-50 file:text-blue-700">
                            <div id="logoPreview" class="mt-2 hidden"><img id="logoImg" class="h-12 w-auto" alt="Logo"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium">Image d'arrière-plan PDF (optionnelle)</label>
                            <input type="file" id="bgUpload" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:bg-blue-50 file:text-blue-700">
                            <p class="text-xs text-gray-400 mt-1">Centrée, réduite (60%), transparente (opacité 0.15)</p>
                        </div>
                    </div>
                </div>
                <div class="mt-8 text-sm text-gray-500">
                    <i class="fas fa-info-circle"></i> Les séances sont gérées dans l'onglet "Séances". Respectez les créneaux fixes.
                </div>
            </div>
        `;
        document.getElementById('dynamicContent').innerHTML = html;
        document.getElementById('sidebarLogoUpload')?.addEventListener('change', e => {
            const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ sidebarLogoURL=ev.target.result; localStorage.setItem('sidebarLogo',sidebarLogoURL); updateSidebarLogo(); showToast("Logo de la sidebar mis à jour","success"); }; reader.readAsDataURL(file); }
        });
        document.getElementById('logoUpload')?.addEventListener('change', e => {
            const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ logoDataURL=ev.target.result; const preview=document.getElementById('logoPreview'), img=document.getElementById('logoImg'); if(preview && img){ img.src=logoDataURL; preview.classList.remove('hidden'); } showToast("Logo PDF chargé","success"); }; reader.readAsDataURL(file); }
        });
        document.getElementById('bgUpload')?.addEventListener('change', e => {
            const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ backgroundImageURL=ev.target.result; showToast("Image de fond chargée","success"); }; reader.readAsDataURL(file); }
        });
        document.getElementById('publishFileBtn')?.addEventListener('click', publishCurrentSchedule);
        document.getElementById('pdfExportBtn')?.addEventListener('click',()=>exporterPDFOfficiel(currentSelectedLevel));
        document.getElementById('pdfExportAllBtn')?.addEventListener('click',()=>exporterAllLevelsPDF());
        document.querySelectorAll('.level-select').forEach(btn=>{
            btn.addEventListener('click',()=>{
                currentSelectedLevel=btn.getAttribute('data-level');
                document.querySelectorAll('.level-select').forEach(b=>b.classList.remove('bg-blue-700','text-white'));
                btn.classList.add('bg-blue-700','text-white');
            });
        });
    }

    // ---------- GESTION ENSEIGNANTS, SALLES, SÉANCES (inchangées) ----------
    function renderTeachersPage(){
        if(currentRole!=='admin'){ renderDashboard(); return; }
        const html=`<div class="glass-card rounded-3xl p-6 shadow-xl"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black text-blue-900">Enseignants</h2><button onclick="openTeacherModal()" class="bg-green-600 text-white px-5 py-2 rounded-full">Ajouter</button></div><div class="overflow-x-auto"><table class="min-w-full bg-white/60 rounded-2xl"><thead class="bg-blue-800 text-white"><tr><th class="p-3">Nom</th><th>Email</th><th>Matière principale</th><th>Statut</th><th>Heures/semaine</th><th>Actions</th></tr></thead><tbody>${teachers.map(t=>`<tr><td class="p-3">${t.name}<td class="p-3">${t.email}<td class="p-3">${t.subject||''}<td class="capitalize">${t.status}<td class="p-3">${getTeacherWeeklyHours(t.id).toFixed(2)}/${t.hoursPerWeek}h<td class="p-3"><button onclick="editTeacher('${t.id}')" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteTeacherConfirm('${t.id}')" class="text-red-600"><i class="fas fa-trash"></i></button>`).join('')}</tbody>}</div></div>
        <div id="teacherModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50"><div class="bg-white p-6 rounded-2xl w-96"><h3 id="teacherModalTitle" class="text-xl font-bold mb-4">Enseignant</h3><input type="hidden" id="teacherId"><input id="teacherName" placeholder="Nom" class="w-full border p-2 mb-2 rounded"><input id="teacherEmail" placeholder="Email" class="w-full border p-2 mb-2 rounded"><input id="teacherSubject" placeholder="Matière principale" class="w-full border p-2 mb-2 rounded"><select id="teacherStatus"><option value="permanent">Permanent</option><option value="missionnaire">Missionnaire</option></select><input id="teacherHours" type="number" step="0.5" placeholder="Heures max / semaine" class="w-full border p-2 rounded"><div class="flex justify-end gap-2 mt-4"><button onclick="closeTeacherModal()" class="px-4 py-2 bg-gray-300 rounded">Annuler</button><button id="saveTeacherBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Enregistrer</button></div></div></div>`;
        document.getElementById('dynamicContent').innerHTML=html;
        document.getElementById('saveTeacherBtn')?.addEventListener('click',saveTeacher);
    }
    function openTeacherModal(id=null){ editTeacherId=id; const modal=document.getElementById('teacherModal'); const title=document.getElementById('teacherModalTitle'); if(id){ const t=teachers.find(t=>t.id===id); if(t){ document.getElementById('teacherId').value=t.id; document.getElementById('teacherName').value=t.name; document.getElementById('teacherEmail').value=t.email; document.getElementById('teacherSubject').value=t.subject||''; document.getElementById('teacherStatus').value=t.status; document.getElementById('teacherHours').value=t.hoursPerWeek; title.innerText="Modifier enseignant"; } }else{ document.getElementById('teacherId').value=''; document.getElementById('teacherName').value=''; document.getElementById('teacherEmail').value=''; document.getElementById('teacherSubject').value=''; document.getElementById('teacherStatus').value='permanent'; document.getElementById('teacherHours').value=''; title.innerText="Ajouter un enseignant"; } modal.classList.remove('hidden'); modal.classList.add('flex'); }
    function closeTeacherModal(){ document.getElementById('teacherModal').classList.add('hidden'); editTeacherId=null; }
    function saveTeacher(){ const name=document.getElementById('teacherName').value.trim(); const email=document.getElementById('teacherEmail').value.trim(); const subject=document.getElementById('teacherSubject').value.trim(); const status=document.getElementById('teacherStatus').value; const hours=parseFloat(document.getElementById('teacherHours').value); if(!name||!email||isNaN(hours)||hours<0){ showToast("Champs invalides","error"); return; } if(editTeacherId){ let idx=teachers.findIndex(t=>t.id===editTeacherId); if(idx!==-1) teachers[idx]={...teachers[idx],name,email,subject,status,hoursPerWeek:hours}; showToast("Enseignant modifié","success"); }else{ teachers.push({id:'t'+Date.now()+Math.random().toString(36),name,email,subject,status,hoursPerWeek:hours}); showToast("Enseignant ajouté","success"); } persistAll(); closeTeacherModal(); renderTeachersPage(); }
    function editTeacher(id){ openTeacherModal(id); }
    function deleteTeacherConfirm(id){ if(sessions.some(s=>s.teacherId===id)){ showToast("Cet enseignant a des séances","error"); return; } teachers=teachers.filter(t=>t.id!==id); persistAll(); renderTeachersPage(); showToast("Supprimé","success"); }

    function renderRoomsPage(){
        if(currentRole!=='admin'){ renderDashboard(); return; }
        const html=`<div class="glass-card rounded-3xl p-6 shadow-xl"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black text-blue-900">Salles</h2><button onclick="openRoomModal()" class="bg-green-600 text-white px-5 py-2 rounded-full">Ajouter</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-3">${rooms.map(r=>`<div class="bg-white/70 rounded-xl p-4 flex justify-between"><span><i class="fas fa-building mr-2"></i>${r.name}</span><div><button onclick="editRoom('${r.id}')" class="text-blue-600 mr-3"><i class="fas fa-edit"></i></button><button onclick="deleteRoomConfirm('${r.id}')" class="text-red-600"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div></div>
        <div id="roomModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50"><div class="bg-white p-6 rounded-2xl w-96"><h3 class="text-xl font-bold mb-3" id="roomModalTitle">Salle</h3><input type="hidden" id="roomId"><input id="roomName" placeholder="Nom de la salle" class="w-full border p-2 rounded"><div class="flex justify-end gap-2 mt-4"><button onclick="closeRoomModal()" class="px-4 py-2 bg-gray-300 rounded">Annuler</button><button id="saveRoomBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Enregistrer</button></div></div></div>`;
        document.getElementById('dynamicContent').innerHTML=html;
        document.getElementById('saveRoomBtn')?.addEventListener('click',saveRoom);
    }
    function openRoomModal(id=null){ editRoomId=id; const modal=document.getElementById('roomModal'); const title=document.getElementById('roomModalTitle'); if(id){ const r=rooms.find(r=>r.id===id); if(r){ document.getElementById('roomId').value=r.id; document.getElementById('roomName').value=r.name; title.innerText="Modifier salle"; } }else{ document.getElementById('roomId').value=''; document.getElementById('roomName').value=''; title.innerText="Ajouter salle"; } modal.classList.remove('hidden'); modal.classList.add('flex'); }
    function closeRoomModal(){ document.getElementById('roomModal').classList.add('hidden'); editRoomId=null; }
    function saveRoom(){ const name=document.getElementById('roomName').value.trim(); if(!name){ showToast("Nom requis","error"); return; } if(editRoomId){ const idx=rooms.findIndex(r=>r.id===editRoomId); if(idx!==-1) rooms[idx].name=name; }else{ rooms.push({id:'r'+Date.now(),name}); } persistAll(); closeRoomModal(); renderRoomsPage(); showToast("Salle sauvegardée","success"); }
    function editRoom(id){ openRoomModal(id); }
    function deleteRoomConfirm(id){ if(sessions.some(s=>s.roomId===id)){ showToast("Salle utilisée dans des séances","error"); return; } rooms=rooms.filter(r=>r.id!==id); persistAll(); renderRoomsPage(); showToast("Salle supprimée","success"); }

    function renderSessionsPage(){
        if(currentRole!=='admin'){ renderDashboard(); return; }
        const teacherOptions=teachers.map(t=>`<option value="${t.id}">${t.name} (${t.subject?t.subject+', ':''}${t.hoursPerWeek}h max)</option>`).join('');
        const roomOptions=rooms.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');
        const slotOptions=SLOTS.filter(s=>!s.isPause).map(slot=>`<option value="${slot.debut}|${slot.fin}">${slot.label}</option>`).join('');
        const natureOptions=NATURES.map(n=>`<option value="${n}">${n}</option>`).join('');
        const isEditing=editSessionId!==null;
        const sessionData=isEditing?sessions.find(s=>s.id===editSessionId):null;
        const html=`<div class="glass-card rounded-3xl p-6 space-y-6"><div class="flex justify-between"><h2 class="text-2xl font-black text-blue-900">${isEditing?'Modifier séance':'Nouvelle séance'}</h2>${isEditing?`<button onclick="cancelEditSession()" class="bg-gray-300 px-4 py-1 rounded-full">Annuler</button>`:''}</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div><label>Matière *</label><input id="sessionSubject" value="${sessionData?.subject||''}" class="w-full border rounded-lg p-2"></div>
        <div><label>Niveau *</label><select id="sessionLevel" class="w-full border rounded-lg p-2">${LEVELS.map(l=>`<option ${sessionData?.level===l?'selected':''}>${l}</option>`).join('')}</select></div>
        <div><label>Jour *</label><select id="sessionDay" class="w-full border rounded-lg p-2">${JOURS.map(d=>`<option ${sessionData?.day===d?'selected':''}>${d}</option>`).join('')}</select></div>
        <div><label>Créneau *</label><select id="sessionSlot" class="w-full border rounded-lg p-2">${slotOptions}</select></div>
        <div><label>Enseignant *</label><select id="sessionTeacher" class="w-full border rounded-lg p-2">${teacherOptions}</select></div>
        <div><label>Salle *</label><select id="sessionRoom" class="w-full border rounded-lg p-2">${roomOptions}</select></div>
        <div><label>Nature *</label><select id="sessionNature" class="w-full border rounded-lg p-2">${natureOptions}</select></div>
        <div><label>Statut</label><select id="sessionStatus" class="w-full border rounded-lg p-2"><option ${sessionData?.status==='permanent'?'selected':''}>permanent</option><option ${sessionData?.status==='missionnaire'?'selected':''}>missionnaire</option></select></div></div>
        <button onclick="saveSession()" class="bg-blue-700 text-white px-6 py-2 rounded-full shadow">${isEditing?'Mettre à jour':'Créer séance'}</button>
        <hr><h3 class="text-xl font-bold">Liste des séances existantes</h3><div class="overflow-x-auto"><table class="w-full bg-white/60 rounded-xl"><thead class="bg-blue-800 text-white"><tr><th>Matière</th><th>Niv.</th><th>Jour</th><th>Créneau</th><th>Nature</th><th>Enseignant</th><th>Salle</th><th>Actions</th></td></thead><tbody>${sessions.map(s=>{const t=teachers.find(tt=>tt.id===s.teacherId); const r=rooms.find(rr=>rr.id===s.roomId); const slotLabel=SLOTS.find(sl=>sl.debut===s.start&&sl.fin===s.end)?.label||`${s.start}-${s.end}`; return `<tr><td class="p-2">${s.subject}<td class="p-2">${s.level}<td class="p-2">${s.day}<td class="p-2">${slotLabel}<td class="p-2">${s.nature||'CT'}<td class="p-2">${t?.name||'?'} (${t?.subject||''})<td class="p-2">${r?.name||'?'}<td class="p-2"><button onclick="editSessionById('${s.id}')" class="text-blue-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteSessionConfirm('${s.id}')" class="text-red-600"><i class="fas fa-trash"></i></button>`}).join('')}</tbody>}</div></div>`;
        document.getElementById('dynamicContent').innerHTML=html;
        if(sessionData && !isEditing){ const slotSelect=document.getElementById('sessionSlot'); if(slotSelect) slotSelect.value=`${sessionData.start}|${sessionData.end}`; }
    }
    function saveSession(){
        const subject=document.getElementById('sessionSubject').value.trim();
        const level=document.getElementById('sessionLevel').value;
        const day=document.getElementById('sessionDay').value;
        const teacherId=document.getElementById('sessionTeacher').value;
        const roomId=document.getElementById('sessionRoom').value;
        const slotValue=document.getElementById('sessionSlot').value;
        const nature=document.getElementById('sessionNature').value;
        const status=document.getElementById('sessionStatus').value;
        if(!subject||!teacherId||!roomId||!slotValue||!level){ showToast("Tous les champs sont requis","error"); return; }
        const [start,end]=slotValue.split('|'); if(!start||!end){ showToast("Créneau invalide","error"); return; }
        const teacher=teachers.find(t=>t.id===teacherId); if(!teacher){ showToast("Enseignant introuvable","error"); return; }
        const duration=getDurationHours(start,end);
        let currentHours=getTeacherWeeklyHours(teacherId,editSessionId);
        if(currentHours+duration>teacher.hoursPerWeek+0.01){ showToast(`Dépassement du quota horaire pour ${teacher.name} (max ${teacher.hoursPerWeek}h, déjà ${currentHours.toFixed(2)}h)`, "error"); return; }
        const newSession={teacherId,roomId,subject,day,start,end,status,level,nature,id:editSessionId||'s'+Date.now()};
        const conflict=checkConflict(newSession,editSessionId); if(conflict.conflict){ showToast(conflict.message,"error"); return; }
        if(editSessionId){ const idx=sessions.findIndex(s=>s.id===editSessionId); if(idx!==-1) sessions[idx]={...newSession,id:editSessionId}; showToast("Séance mise à jour","success"); editSessionId=null; }
        else{ sessions.push(newSession); showToast("Séance ajoutée","success"); }
        persistAll(); renderSessionsPage();
    }
    function editSessionById(id){ editSessionId=id; renderSessionsPage(); }
    function cancelEditSession(){ editSessionId=null; renderSessionsPage(); }
    function deleteSessionConfirm(id){ if(confirm("Supprimer cette séance ?")){ sessions=sessions.filter(s=>s.id!==id); persistAll(); showToast("Séance supprimée","success"); if(currentPage==='sessions') renderSessionsPage(); else renderCurrentPage(); } }

    function navigateToPage(page){ currentPage=page; editSessionId=null; renderCurrentPage(); }
    function renderCurrentPage(){
        if(currentPage==='dashboard') renderDashboard();
        else if(currentPage==='teachers') renderTeachersPage();
        else if(currentPage==='rooms') renderRoomsPage();
        else if(currentPage==='sessions') renderSessionsPage();
        else renderDashboard();
        highlightActiveLink();
        const adminElements=document.querySelectorAll('.admin-only');
        if(currentRole!=='admin') adminElements.forEach(el=>el.style.display='none');
        else adminElements.forEach(el=>el.style.display='flex');
    }
    function highlightActiveLink(){ document.querySelectorAll('.sidebar-item').forEach(el=>{ el.classList.remove('active'); if(el.getAttribute('data-page')===currentPage) el.classList.add('active'); }); }

    // Page publicitaire pour enseignants/étudiants
    function showPublicityPage(){
        document.getElementById('mainApp').style.display = 'none';
        const existing = document.getElementById('publicityPage');
        if(existing) existing.remove();
        const div = document.createElement('div');
        div.id = 'publicityPage';
        div.className = 'publicity-page';
        const hasPublication = localStorage.getItem('insta_published_file') !== null;
        div.innerHTML = `
            <div class="publicity-card">
                <div class="logo-animation mb-4"><i class="fas fa-calendar-alt text-6xl text-blue-700"></i></div>
                <h1 class="text-3xl font-bold text-blue-900 mb-2">INSTA-EDT</h1>
                <p class="text-gray-600 mb-4">Plateforme de gestion des emplois du temps</p>
                ${hasPublication ? `
                    <div class="bg-green-50 rounded-lg p-4 mb-6">
                        <i class="fas fa-download text-green-600 mr-2"></i>
                        <span class="font-semibold">Emploi du temps officiel disponible</span>
                        <p class="text-sm text-gray-500 mt-1">Téléchargez le dernier fichier publié par l'administration.</p>
                    </div>
                ` : `
                    <div class="bg-yellow-50 rounded-lg p-4 mb-6">
                        <i class="fas fa-info-circle text-yellow-600 mr-2"></i>
                        <span class="font-semibold">Aucune publication pour le moment</span>
                        <p class="text-sm text-gray-500 mt-1">L'administrateur n'a pas encore publié l'emploi du temps. Revenez plus tard.</p>
                    </div>
                `}
                ${hasPublication ? `<button id="downloadFromPublicity" class="download-btn-pub"><i class="fas fa-download"></i> Télécharger l'emploi du temps</button>` : ''}
                <button id="logoutFromPublicity" class="mt-6 text-gray-500 hover:text-gray-700 text-sm"><i class="fas fa-sign-out-alt mr-1"></i> Se déconnecter</button>
            </div>
        `;
        document.body.appendChild(div);
        if(hasPublication){
            document.getElementById('downloadFromPublicity')?.addEventListener('click', () => {
                const stored = localStorage.getItem('insta_published_file');
                if(stored){
                    const blob = new Blob([stored], {type: 'text/html'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Emploi_du_temps_publie.html`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast("Téléchargement démarré", "success");
                } else {
                    showToast("Aucune publication disponible.", "info");
                }
            });
        }
        document.getElementById('logoutFromPublicity')?.addEventListener('click', () => { logout(); });
    }

    function login(role){
        const email=document.getElementById('loginEmail').value.trim();
        const emailRegex=/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if(!email||!emailRegex.test(email)){ showToast("Email invalide","error"); return; }
        currentRole=role; currentUserEmail=email;
        localStorage.setItem('userRole',role); localStorage.setItem('userEmail',email);
        document.getElementById('loginOverlay').style.opacity='0';
        setTimeout(()=>{
            document.getElementById('loginOverlay').style.display='none';
            if(role === 'admin'){
                document.getElementById('mainApp').style.display='block';
                updateSidebarLogo();
                loadData();
                renderCurrentPage();
            } else {
                showPublicityPage();
            }
        },500);
    }

    function logout(){
        currentRole=null; currentUserEmail=null;
        localStorage.removeItem('userRole'); localStorage.removeItem('userEmail');
        document.getElementById('mainApp').style.display='none';
        const pub=document.getElementById('publicityPage');
        if(pub) pub.remove();
        document.getElementById('loginOverlay').style.display='flex';
        document.getElementById('loginOverlay').style.opacity='1';
        teachers=[]; rooms=[]; sessions=[];
    }
    function goHome(){ logout(); }

    // Initialisation
    document.querySelectorAll('.role-btn').forEach(btn=>{ btn.addEventListener('click',()=>login(btn.getAttribute('data-role'))); });
    document.getElementById('logoutBtn')?.addEventListener('click',logout);
    document.getElementById('homeBtn')?.addEventListener('click',goHome);
    document.getElementById('resetDataBtn')?.addEventListener('click',()=>{ if(confirm("Réinitialiser toutes les données ?")) resetAllData(); });
    document.querySelectorAll('.sidebar-item').forEach(link=>{ link.addEventListener('click',(e)=>{ e.preventDefault(); const page=link.getAttribute('data-page'); if(page) navigateToPage(page); }); });

    if(currentRole && currentUserEmail){
        if(currentRole === 'admin'){
            document.getElementById('loginOverlay').style.display='none';
            document.getElementById('mainApp').style.display='block';
            updateSidebarLogo();
            loadData();
            renderCurrentPage();
        } else {
            document.getElementById('loginOverlay').style.display='none';
            showPublicityPage();
        }
    } else {
        document.getElementById('loginOverlay').style.display='flex';
        document.getElementById('mainApp').style.display='none';
    }
</script>
</body>
</html>
